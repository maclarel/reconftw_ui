<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ReconFTW UI{% endblock %}</title>

  <!-- Bootstrap 5.3.3 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">

  <!-- Bootstrap Icons 1.11.3 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        integrity="sha384-tViUnnbplMdV3lS5OtBosPx1D9QkNiYkGUkMzecwPEkNsVAhM1R3w6AXeAIlYyS"
        crossorigin="anonymous">

  <!-- DataTables 2.0.8 + Bootstrap 5 integration -->
  <link rel="stylesheet"
        href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.min.css">

  <!-- Custom styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- Top navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark rftw-navbar px-3" id="topbar">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
      <i class="bi bi-radar text-accent fs-4"></i>
      <span class="fw-bold">ReconFTW UI</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navMain" aria-controls="navMain"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('index') }}">
            <i class="bi bi-house-door me-1"></i>Domains
          </a>
        </li>
      </ul>
      <!-- Auto-refresh toggle -->
      <div class="d-flex align-items-center ms-3 gap-2">
        <span class="text-muted small" id="refresh-label">Auto-refresh: off</span>
        <div class="form-check form-switch mb-0">
          <input class="form-check-input" type="checkbox" role="switch"
                 id="autoRefreshToggle" title="Toggle auto-refresh">
        </div>
      </div>
    </div>
  </nav>

  {% block body %}{% endblock %}

  <!-- Bootstrap 5.3.3 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFRZ4jE2JcovFOp905Gn0oKDR3"
          crossorigin="anonymous"></script>

  <!-- jQuery 3.7.1 (required by DataTables) -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
          integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
          crossorigin="anonymous"></script>

  <!-- DataTables 2.0.8 -->
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/2.0.8/js/dataTables.bootstrap5.min.js"></script>

  <!-- App JS -->
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
